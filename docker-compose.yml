  #     - AISFRIENDS_API_KEY=${AISFRIENDS_API_KEY:-}
  #     - AISFRIENDS_API_BASE_URL=${AISFRIENDS_API_BASE_URL:-}
  #     - AISFRIENDS_STATION_ID=${AISFRIENDS_STATION_ID:-}
