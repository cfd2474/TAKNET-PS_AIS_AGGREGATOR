# TAKNET-PS AIS Aggregator — AIS-only stack (uncomment services as they are added).

name: taknet-ais-aggregator

services:

  ais-proxy:
    build:
      context: ./ais-proxy
      dockerfile: Dockerfile
    container_name: taknet-ais-proxy
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/Los_Angeles}
      - LISTEN_PORT=10110
      - AIS_CORE_HOST=${AIS_CORE_HOST:-ais-core}
      - AIS_CORE_PORT=${AIS_CORE_PORT:-4000}
      - DB_PATH=/data/ais_aggregator.db
      - NETBIRD_ENABLED=${NETBIRD_ENABLED:-true}
      - NETBIRD_API_URL=${NETBIRD_API_URL:-}
      - NETBIRD_API_TOKEN=${NETBIRD_API_TOKEN:-}
      - NETBIRD_CIDR=${NETBIRD_CIDR:-100.64.0.0/10}
      - GEOIP_ENABLED=${GEOIP_ENABLED:-true}
      # Optional: copy feeder NMEA to UDP targets (e.g. AIS Friends — ais.aisfriends.com:assigned_port)
      - AIS_UDP_FORWARD_ENABLED=${AIS_UDP_FORWARD_ENABLED:-false}
      - AIS_UDP_FORWARD_TARGETS=${AIS_UDP_FORWARD_TARGETS:-}
      - AIS_UDP_FORWARD_DNS_TTL_S=${AIS_UDP_FORWARD_DNS_TTL_S:-300}
    ports:
      - "${AIS_FEEDER_PORT:-10110}:10110/tcp"
    volumes:
      - ais-db-data:/data
    networks:
      - taknet-ais-internal
    depends_on:
      ais-core:
        condition: service_started

  ais-core:
    build:
      context: ./ais-core
      dockerfile: Dockerfile
    container_name: taknet-ais-core
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/Los_Angeles}
      - LISTEN_PORT=4000
    volumes:
      - ais-runtime:/run/ais
    networks:
      - taknet-ais-internal

  dashboard:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: taknet-ais-dashboard
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/Los_Angeles}
      - DB_PATH=/data/ais_aggregator.db
      - SECRET_KEY=${SECRET_KEY:-change-me}
      - SITE_NAME=${SITE_NAME:-TAKNET-PS AIS Aggregator}
      # Host-absolute install root (same as INSTALL_DIR in .env). Required for web UI updates: docker:cli bind-mounts this path on the Docker host — must NOT be /app.
      - INSTALL_DIR=${INSTALL_DIR:-/opt/taknet-ais-aggregator}
      - GITHUB_REPO=${GITHUB_REPO:-cfd2474/TAKNET-PS_AIS_AGGREGATOR}
      - VESSELS_JSON_URL=${VESSELS_JSON_URL:-http://ais-core:4001/data/vessels.json}
      - DIRECT_VESSELS_JSON_URL=${DIRECT_VESSELS_JSON_URL:-http://ais-core:4001/data/vessels.json}
      - READSB_HOST=${READSB_HOST:-ais-core}
      - SITE_LAT=${SITE_LAT:-33.8753}
      - SITE_LON=${SITE_LON:--117.5664}
      - NETWORK_FEEDS_STATUS_PATH=/app/var/network-feeds-status
      - RESEND_ENABLED=${RESEND_ENABLED:-false}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-noreply@notify.tak-solutions.com}
      - RESEND_ADMIN_EMAILS=${RESEND_ADMIN_EMAILS:-}
    volumes:
      - ais-db-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - ${INSTALL_DIR:-/opt/taknet-ais-aggregator}/.env:${INSTALL_DIR:-/opt/taknet-ais-aggregator}/.env:rw
      - ${INSTALL_DIR:-/opt/taknet-ais-aggregator}/var:/app/var
      - ${INSTALL_DIR:-/opt/taknet-ais-aggregator}/RELEASES.json:/app/RELEASES.json:ro
      - ${INSTALL_DIR:-/opt/taknet-ais-aggregator}/VERSION:/app/VERSION:ro
    ports:
      - "${WEB_PORT:-5000}:5000"
    networks:
      - taknet-ais-internal
    depends_on:
      ais-core:
        condition: service_started

  # Optional: aiscatcher.org exchange connector (reads AISCATCHER_* from host .env).
  # Implement ./aiscatcher-connector and merge into VESSELS_JSON_URL via vessel-merger when ready.
  # aiscatcher-connector:
